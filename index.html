<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Modelo 3D</title>

  <!-- model-viewer de Google -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: white;
      height: 100vh;
      overflow: hidden;
    }
    
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #1a1a1a;
    }

    /* Botón AR personalizado */
    #ar-button {
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,102,204,0.4);
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #ar-button:hover {
      background-color: #0052a3;
    }

    #ar-button:active {
      transform: translateX(-50%) scale(0.98);
    }

    /* Info top */
    #info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 10;
    }

    /* Mensaje de no AR */
    #ar-not-available {
      background: rgba(255,140,0,0.9);
      color: white;
      border-radius: 24px;
      padding: 14px 28px;
      font-size: 14px;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: none;
      text-align: center;
      max-width: 80%;
    }

    /* Selector de animaciones */
    #anim-selector {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 90%;
      justify-content: center;
    }

    .anim-btn {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .anim-btn:hover {
      background: rgba(255,255,255,0.22);
    }

    .anim-btn.active {
      background: #0066cc;
      border-color: #0066cc;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="info">📱 Modelo 3D</div>

  <model-viewer
    id="viewer"
    src="Glossy.glb"
    alt="Modelo 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="20deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1.2"
    loading="eager"
    autoplay
    animation-name="Todas"
  >
    <!-- Botón AR personalizado -->
    <button slot="ar-button" id="ar-button">
      👁️ Ver en AR
    </button>
  </model-viewer>

  <!-- Selector de animaciones (se llena dinámicamente) -->
  <div id="anim-selector"></div>

  <!-- Mensaje cuando AR no está disponible -->
  <div id="ar-not-available">
    ⚠️ AR no disponible en este dispositivo<br>
    <small>Usa Android con Chrome, o iPhone con Safari</small>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('ar-button');
    const arNotAvailable = document.getElementById('ar-not-available');
    const animSelector = document.getElementById('anim-selector');

    // Nombre de la animación combinada que reproduce todos los clips a la vez
    const ALL_ANIMATIONS_NAME = 'Todas';

    function setActiveButton(name) {
      [...animSelector.children].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.name === name);
      });
    }

    function playAnimation(name) {
      viewer.animationName = name;
      viewer.currentTime = 0;
      viewer.play({ repetitions: Infinity });
      setActiveButton(name);
    }

    function buildAnimationButtons() {
      animSelector.innerHTML = '';
      const names = viewer.availableAnimations || [];
      names.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'anim-btn';
        btn.dataset.name = name;
        btn.textContent = (name === ALL_ANIMATIONS_NAME) ? '✨ Todas' : name;
        btn.addEventListener('click', () => playAnimation(name));
        animSelector.appendChild(btn);
      });
      setActiveButton(ALL_ANIMATIONS_NAME);
    }

    viewer.addEventListener('load', () => {
      console.log('✅ Modelo cargado correctamente');
      buildAnimationButtons();
      playAnimation(ALL_ANIMATIONS_NAME);
    });

    viewer.addEventListener('error', (e) => {
      console.error('❌ Error cargando modelo:', e.detail);
    });

    // Verificar si AR está disponible
    viewer.addEventListener('ar-status', (event) => {
      console.log('🔍 AR status:', event.detail.status);
      
      if (event.detail.status === 'not-presenting') {
        // Estado normal, no hacer nada
      } else if (event.detail.status === 'failed') {
        console.error('❌ AR falló');
      }
    });

    // Verificar capacidad de AR después de un momento
    setTimeout(() => {
      if (!viewer.canActivateAR) {
        console.warn('⚠️ AR no disponible en este dispositivo');
        arButton.style.display = 'none';
        arNotAvailable.style.display = 'block';
      } else {
        console.log('✅ AR disponible');
      }
    }, 2000);
  </script>

</body>
</html>
